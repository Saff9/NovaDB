# Docker Compose for NovaDB
# Usage: docker compose up -d

services:
  novadb:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9876:9876"
    volumes:
      - novadb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "echo -e 'PING 0\r\n' | nc localhost 9876 | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  novadb_data:
