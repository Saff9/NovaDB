name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  codeql:
    name: "CodeQL (C)"
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: c
          queries: security-extended,security-and-quality
      - name: Build
        run: make release
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c"
